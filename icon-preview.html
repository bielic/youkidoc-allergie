<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Vorschau – Tränendes Auge & Blume</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e2e2e2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 { font-size: 17px; color: #444; margin-bottom: 28px; font-weight: 600; letter-spacing: 0.01em; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 460px; width: 100%; }
  .card {
    background: white;
    border-radius: 20px;
    padding: 28px 16px 18px;
    text-align: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.11);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 26px rgba(0,0,0,0.17); }
  .card svg { border-radius: 22%; display: block; margin: 0 auto; }
  .card h3 { margin-top: 14px; font-size: 14px; color: #222; font-weight: 700; }
  .card p { font-size: 11px; color: #aaa; margin-top: 3px; }
</style>
</head>
<body>
<h1>4 Icon-Varianten — Tränendes Auge &amp; Blume</h1>
<div class="grid">

  <!-- Option 1: Grün klassisch -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1D9E75"/>
      <!-- Eye white -->
      <path d="M 36,98 C 55,68 145,68 164,98 C 145,128 55,128 36,98 Z" fill="white" opacity="0.96"/>
      <!-- Iris -->
      <circle cx="100" cy="98" r="22" fill="#5BB8E8"/>
      <!-- Pupil -->
      <circle cx="100" cy="98" r="12" fill="#1a2a1a"/>
      <!-- Eye highlight -->
      <circle cx="108" cy="90" r="6" fill="white" opacity="0.90"/>
      <!-- Upper lashes (thick lid line) -->
      <path d="M 36,98 C 55,68 145,68 164,98" fill="none" stroke="#1a2a1a" stroke-width="5" stroke-linecap="round"/>
      <!-- Teardrop 1 – large -->
      <path d="M 0,-13 C -11,-5 -12,8 0,18 C 12,8 11,-5 0,-13 Z"
            transform="translate(70,128)" fill="#88CCFF" opacity="0.92"/>
      <!-- Teardrop 2 – smaller -->
      <path d="M 0,-9 C -7,-3 -8,6 0,12 C 8,6 7,-3 0,-9 Z"
            transform="translate(88,143)" fill="#88CCFF" opacity="0.70"/>
      <!-- Flower top-right: 5 petals -->
      <g transform="translate(158,44)">
        <ellipse cx="0" cy="-15" rx="7" ry="11" fill="white" opacity="0.88"/>
        <ellipse cx="0" cy="-15" rx="7" ry="11" fill="white" opacity="0.88" transform="rotate(72,0,0)"/>
        <ellipse cx="0" cy="-15" rx="7" ry="11" fill="white" opacity="0.88" transform="rotate(144,0,0)"/>
        <ellipse cx="0" cy="-15" rx="7" ry="11" fill="white" opacity="0.88" transform="rotate(216,0,0)"/>
        <ellipse cx="0" cy="-15" rx="7" ry="11" fill="white" opacity="0.88" transform="rotate(288,0,0)"/>
        <circle cx="0" cy="0" r="8" fill="#FFC107"/>
      </g>
    </svg>
    <h3>Option 1 – Grün</h3>
    <p>Auge + Tränen, Blume oben rechts</p>
  </div>

  <!-- Option 2: Blume dominiert, Auge im Zentrum -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#FFF4F0"/>
      <!-- Large flower: 6 petals -->
      <g transform="translate(100,90)">
        <ellipse cx="0" cy="-44" rx="19" ry="30" fill="#FFB3A0" opacity="0.88"/>
        <ellipse cx="0" cy="-44" rx="19" ry="30" fill="#FFB3A0" opacity="0.88" transform="rotate(60,0,0)"/>
        <ellipse cx="0" cy="-44" rx="19" ry="30" fill="#FFB3A0" opacity="0.88" transform="rotate(120,0,0)"/>
        <ellipse cx="0" cy="-44" rx="19" ry="30" fill="#FFB3A0" opacity="0.88" transform="rotate(180,0,0)"/>
        <ellipse cx="0" cy="-44" rx="19" ry="30" fill="#FFB3A0" opacity="0.88" transform="rotate(240,0,0)"/>
        <ellipse cx="0" cy="-44" rx="19" ry="30" fill="#FFB3A0" opacity="0.88" transform="rotate(300,0,0)"/>
        <!-- White disk -->
        <circle cx="0" cy="0" r="28" fill="#FFF4F0"/>
        <!-- Eye inside flower -->
        <path d="M -22,0 C -14,-16 14,-16 22,0 C 14,16 -14,16 -22,0 Z" fill="white"/>
        <!-- Iris -->
        <circle cx="0" cy="0" r="10" fill="#3A9AD9"/>
        <circle cx="0" cy="0" r="5" fill="#1a1a2a"/>
        <circle cx="3" cy="-3" r="2.5" fill="white" opacity="0.95"/>
        <!-- Upper lid -->
        <path d="M -22,0 C -14,-16 14,-16 22,0" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Teardrop -->
        <path d="M 0,-7 C -5,-2 -6,5 0,9 C 6,5 5,-2 0,-7 Z"
              transform="translate(-14,10)" fill="#88CCFF" opacity="0.88"/>
      </g>
      <!-- Pollen -->
      <circle cx="42" cy="46" r="5" fill="#FFC107" opacity="0.90"/>
      <circle cx="158" cy="42" r="4" fill="#FFC107" opacity="0.80"/>
      <circle cx="38" cy="152" r="4" fill="#FFB3A0" opacity="0.75"/>
      <circle cx="162" cy="155" r="5" fill="#FFC107" opacity="0.70"/>
    </svg>
    <h3>Option 2 – Blüte</h3>
    <p>Blume mit Auge im Zentrum</p>
  </div>

  <!-- Option 3: Hell/Duo – Auge oben, Blume unten -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#F2FAFF"/>
      <rect width="200" height="200" rx="44" fill="none" stroke="#1D9E75" stroke-width="8"/>
      <!-- Eye upper area -->
      <path d="M 38,80 C 60,50 140,50 162,80 C 140,108 60,108 38,80 Z" fill="white" opacity="0.95"/>
      <!-- Iris -->
      <circle cx="100" cy="80" r="20" fill="#4DA6D8"/>
      <!-- Pupil -->
      <circle cx="100" cy="80" r="11" fill="#1a1a2a"/>
      <circle cx="106" cy="74" r="5" fill="white" opacity="0.90"/>
      <!-- Lid -->
      <path d="M 38,80 C 60,50 140,50 162,80" fill="none" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>
      <!-- Tear stream -->
      <path d="M 55,98 C 50,108 48,120 52,130 C 50,128 46,118 50,108 Z" fill="#88CCFF" opacity="0.60"/>
      <path d="M 0,-11 C -8,-4 -9,7 0,15 C 9,7 8,-4 0,-11 Z"
            transform="translate(54,136)" fill="#88CCFF" opacity="0.85"/>
      <!-- Flower lower area: 5 petals -->
      <g transform="translate(100,162)">
        <ellipse cx="0" cy="-24" rx="12" ry="18" fill="#FFB3CB" opacity="0.88"/>
        <ellipse cx="0" cy="-24" rx="12" ry="18" fill="#FFB3CB" opacity="0.88" transform="rotate(72,0,0)"/>
        <ellipse cx="0" cy="-24" rx="12" ry="18" fill="#FFB3CB" opacity="0.88" transform="rotate(144,0,0)"/>
        <ellipse cx="0" cy="-24" rx="12" ry="18" fill="#FFB3CB" opacity="0.88" transform="rotate(216,0,0)"/>
        <ellipse cx="0" cy="-24" rx="12" ry="18" fill="#FFB3CB" opacity="0.88" transform="rotate(288,0,0)"/>
        <circle cx="0" cy="0" r="13" fill="#FFC107"/>
        <circle cx="0" cy="0" r="7" fill="#FFE566"/>
      </g>
      <!-- Divider -->
      <line x1="30" y1="118" x2="170" y2="118" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,5" opacity="0.25"/>
    </svg>
    <h3>Option 3 – Duo</h3>
    <p>Auge oben, Blume unten</p>
  </div>

  <!-- Option 4: Dunkelgrün – Blumenkranz mit Auge -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g4b" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0A5C48"/>
          <stop offset="100%" stop-color="#1D9E75"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" rx="44" fill="url(#g4b)"/>
      <!-- Petal wreath: 8 petals -->
      <g transform="translate(100,100)">
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(45,0,0)"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(90,0,0)"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(135,0,0)"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(180,0,0)"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(225,0,0)"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(270,0,0)"/>
        <ellipse cx="0" cy="-64" rx="11" ry="20" fill="white" opacity="0.20" transform="rotate(315,0,0)"/>
        <!-- Eye white centred -->
        <path d="M -32,0 C -20,-22 20,-22 32,0 C 20,22 -20,22 -32,0 Z" fill="white" opacity="0.96"/>
        <!-- Iris -->
        <circle cx="0" cy="0" r="16" fill="#5BB8E8"/>
        <!-- Pupil -->
        <circle cx="0" cy="0" r="9" fill="#0d1a14"/>
        <!-- Highlight -->
        <circle cx="5" cy="-5" r="4" fill="white" opacity="0.92"/>
        <!-- Lid -->
        <path d="M -32,0 C -20,-22 20,-22 32,0" fill="none" stroke="#0d1a14" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Teardrop 1 -->
        <path d="M 0,-12 C -9,-4 -10,7 0,17 C 10,7 9,-4 0,-12 Z"
              transform="translate(-20,16)" fill="#88CCFF" opacity="0.90"/>
        <!-- Teardrop 2 -->
        <path d="M 0,-8 C -6,-3 -7,5 0,11 C 7,5 6,-3 0,-8 Z"
              transform="translate(-8,32)" fill="#88CCFF" opacity="0.68"/>
      </g>
      <!-- Pollen corners -->
      <circle cx="42" cy="40" r="6" fill="#FFC107" opacity="0.95"/>
      <circle cx="158" cy="38" r="5" fill="#FFC107" opacity="0.85"/>
      <circle cx="160" cy="162" r="6" fill="#FFC107" opacity="0.80"/>
      <circle cx="40" cy="162" r="5" fill="#FFC107" opacity="0.90"/>
    </svg>
    <h3>Option 4 – Kranz</h3>
    <p>Blumenkranz, Auge zentriert</p>
  </div>

</div>
</body>
</html>
