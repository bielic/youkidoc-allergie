<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Vorschau – Laufende Nase & Blüte</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e2e2e2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 { font-size: 17px; color: #444; margin-bottom: 28px; font-weight: 600; letter-spacing: 0.01em; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 460px; width: 100%; }
  .card {
    background: white;
    border-radius: 20px;
    padding: 28px 16px 18px;
    text-align: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.11);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 26px rgba(0,0,0,0.17); }
  .card svg { border-radius: 22%; display: block; margin: 0 auto; }
  .card h3 { margin-top: 14px; font-size: 14px; color: #222; font-weight: 700; }
  .card p { font-size: 11px; color: #aaa; margin-top: 3px; }
</style>
</head>
<body>
<h1>4 Icon-Varianten — Laufende Nase &amp; Blüte</h1>
<div class="grid">

  <!-- Option 1: Grün klassisch -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1D9E75"/>
      <!-- Nose front-view: arch + body -->
      <path d="M 76,94 Q 100,62 124,94 L 123,120 Q 115,132 100,132 Q 85,132 77,120 Z" fill="white" opacity="0.95"/>
      <!-- Nostrils -->
      <ellipse cx="88" cy="118" rx="11" ry="8" fill="#1D9E75" opacity="0.38"/>
      <ellipse cx="112" cy="118" rx="11" ry="8" fill="#1D9E75" opacity="0.38"/>
      <!-- Drip from right nostril -->
      <ellipse cx="116" cy="141" rx="6" ry="9" fill="white" opacity="0.92"/>
      <ellipse cx="116" cy="158" rx="4" ry="6" fill="white" opacity="0.68"/>
      <!-- Flower top-right: 5 petals -->
      <g transform="translate(156,46)">
        <ellipse cx="0" cy="-16" rx="7" ry="12" fill="white" opacity="0.88"/>
        <ellipse cx="0" cy="-16" rx="7" ry="12" fill="white" opacity="0.88" transform="rotate(72,0,0)"/>
        <ellipse cx="0" cy="-16" rx="7" ry="12" fill="white" opacity="0.88" transform="rotate(144,0,0)"/>
        <ellipse cx="0" cy="-16" rx="7" ry="12" fill="white" opacity="0.88" transform="rotate(216,0,0)"/>
        <ellipse cx="0" cy="-16" rx="7" ry="12" fill="white" opacity="0.88" transform="rotate(288,0,0)"/>
        <circle cx="0" cy="0" r="8" fill="#FFC107"/>
      </g>
      <!-- Pollen dots -->
      <circle cx="44" cy="52" r="4" fill="white" opacity="0.28"/>
      <circle cx="36" cy="70" r="3" fill="white" opacity="0.18"/>
    </svg>
    <h3>Option 1 – Grün</h3>
    <p>Klassisch, Nase + Blüte</p>
  </div>

  <!-- Option 2: Rosa – Kirschblüte dominiert -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#FFF2F6"/>
      <!-- Large cherry blossom 5 petals -->
      <g transform="translate(100,96)">
        <ellipse cx="0" cy="-42" rx="20" ry="30" fill="#FFB3CB" opacity="0.90"/>
        <ellipse cx="0" cy="-42" rx="20" ry="30" fill="#FFB3CB" opacity="0.90" transform="rotate(72,0,0)"/>
        <ellipse cx="0" cy="-42" rx="20" ry="30" fill="#FFB3CB" opacity="0.90" transform="rotate(144,0,0)"/>
        <ellipse cx="0" cy="-42" rx="20" ry="30" fill="#FFB3CB" opacity="0.90" transform="rotate(216,0,0)"/>
        <ellipse cx="0" cy="-42" rx="20" ry="30" fill="#FFB3CB" opacity="0.90" transform="rotate(288,0,0)"/>
        <!-- Petal notch detail -->
        <ellipse cx="0" cy="-66" rx="4" ry="6" fill="#FFF2F6" opacity="0.80"/>
        <ellipse cx="0" cy="-66" rx="4" ry="6" fill="#FFF2F6" opacity="0.80" transform="rotate(72,0,0)"/>
        <ellipse cx="0" cy="-66" rx="4" ry="6" fill="#FFF2F6" opacity="0.80" transform="rotate(144,0,0)"/>
        <ellipse cx="0" cy="-66" rx="4" ry="6" fill="#FFF2F6" opacity="0.80" transform="rotate(216,0,0)"/>
        <ellipse cx="0" cy="-66" rx="4" ry="6" fill="#FFF2F6" opacity="0.80" transform="rotate(288,0,0)"/>
        <!-- White centre disk -->
        <circle cx="0" cy="0" r="24" fill="#FFF2F6"/>
        <!-- Nose in centre -->
        <path d="M -14,7 Q 0,-12 14,7 L 13,22 Q 6,28 0,28 Q -6,28 -13,22 Z" fill="#1D9E75" opacity="0.88"/>
        <ellipse cx="-7" cy="22" rx="7" ry="5" fill="#FFF2F6" opacity="0.55"/>
        <ellipse cx="7" cy="22" rx="7" ry="5" fill="#FFF2F6" opacity="0.55"/>
        <!-- Drip -->
        <ellipse cx="10" cy="34" rx="5" ry="7" fill="#1D9E75" opacity="0.78"/>
        <ellipse cx="10" cy="47" rx="3.5" ry="5" fill="#1D9E75" opacity="0.54"/>
      </g>
      <!-- Pollen floating -->
      <circle cx="44" cy="50" r="5" fill="#FFC107" opacity="0.85"/>
      <circle cx="155" cy="44" r="4" fill="#FFC107" opacity="0.75"/>
      <circle cx="36" cy="148" r="3.5" fill="#FFB3CB" opacity="0.80"/>
      <circle cx="162" cy="152" r="4" fill="#FFC107" opacity="0.65"/>
    </svg>
    <h3>Option 2 – Kirschblüte</h3>
    <p>Blüte mit Nase im Zentrum</p>
  </div>

  <!-- Option 3: Weiß/Duo – Nase links, Blüte rechts -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#F4FDFB"/>
      <!-- Teal border -->
      <rect width="200" height="200" rx="44" fill="none" stroke="#1D9E75" stroke-width="9"/>
      <!-- Nose side profile (facing right) -->
      <path d="M 56,58 C 54,58 46,78 48,106 C 49,122 58,134 74,138 C 86,141 98,137 102,128 C 106,119 100,110 90,110 C 82,110 76,118 78,126"
            fill="none" stroke="#1D9E75" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Nostril area -->
      <circle cx="78" cy="130" r="9" fill="#1D9E75" opacity="0.20"/>
      <!-- Drip drops -->
      <ellipse cx="82" cy="147" rx="7" ry="10" fill="#1D9E75" opacity="0.72"/>
      <ellipse cx="82" cy="164" rx="5" ry="7" fill="#1D9E75" opacity="0.46"/>
      <!-- Flower right: 5 petals -->
      <g transform="translate(144,96)">
        <ellipse cx="0" cy="-33" rx="15" ry="23" fill="#FFB3CB" opacity="0.88"/>
        <ellipse cx="0" cy="-33" rx="15" ry="23" fill="#FFB3CB" opacity="0.88" transform="rotate(72,0,0)"/>
        <ellipse cx="0" cy="-33" rx="15" ry="23" fill="#FFB3CB" opacity="0.88" transform="rotate(144,0,0)"/>
        <ellipse cx="0" cy="-33" rx="15" ry="23" fill="#FFB3CB" opacity="0.88" transform="rotate(216,0,0)"/>
        <ellipse cx="0" cy="-33" rx="15" ry="23" fill="#FFB3CB" opacity="0.88" transform="rotate(288,0,0)"/>
        <circle cx="0" cy="0" r="16" fill="#FFC107"/>
        <circle cx="0" cy="0" r="9" fill="#FFE566"/>
      </g>
      <!-- Soft divider -->
      <line x1="113" y1="42" x2="113" y2="168" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,5" opacity="0.22"/>
    </svg>
    <h3>Option 3 – Duo</h3>
    <p>Nase &amp; Blüte nebeneinander</p>
  </div>

  <!-- Option 4: Dunkelgrün – Blütenkranz + Nase -->
  <div class="card">
    <svg width="150" height="150" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0A5C48"/>
          <stop offset="100%" stop-color="#1D9E75"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" rx="44" fill="url(#g4)"/>
      <!-- Wreath: 8 petals at edge -->
      <g transform="translate(100,100)">
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(45,0,0)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(90,0,0)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(135,0,0)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(180,0,0)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(225,0,0)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(270,0,0)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="20" fill="white" opacity="0.22" transform="rotate(315,0,0)"/>
        <!-- Nose front-view centred -->
        <path d="M -24,8 Q 0,-24 24,8 L 22,32 Q 12,44 0,44 Q -12,44 -22,32 Z" fill="white" opacity="0.94"/>
        <ellipse cx="-12" cy="30" rx="10" ry="7" fill="#0A5C48" opacity="0.40"/>
        <ellipse cx="12" cy="30" rx="10" ry="7" fill="#0A5C48" opacity="0.40"/>
        <!-- Drip -->
        <ellipse cx="16" cy="53" rx="6" ry="9" fill="white" opacity="0.88"/>
        <ellipse cx="16" cy="69" rx="4.5" ry="6.5" fill="white" opacity="0.60"/>
      </g>
      <!-- Pollen corners -->
      <circle cx="42" cy="40" r="6" fill="#FFC107" opacity="0.95"/>
      <circle cx="158" cy="38" r="5" fill="#FFC107" opacity="0.85"/>
      <circle cx="160" cy="162" r="6" fill="#FFC107" opacity="0.80"/>
      <circle cx="40" cy="162" r="5" fill="#FFC107" opacity="0.90"/>
      <circle cx="28" cy="100" r="3" fill="#FFC107" opacity="0.48"/>
      <circle cx="172" cy="100" r="3" fill="#FFC107" opacity="0.48"/>
    </svg>
    <h3>Option 4 – Kranz</h3>
    <p>Blütenkranz, Nase zentriert</p>
  </div>

</div>
</body>
</html>
